# VHash Tools 快捷键配置（YAML 格式）
# 此文件为 user 级设置，会覆盖 Cursor/VS Code 的系统默认快捷键
# 安装扩展时会自动将这些绑定写入 keybindings.json
#
# 跨平台说明：
#   - 扩展使用 "key"（Windows/Linux 默认）+ "mac"（macOS 覆盖）模式
#   - macOS: cmd = Cmd, alt = Option
#   - Windows/Linux: cmd = Win, alt = Alt

- key: shift+cmd+e
  command: workbench.files.action.showActiveFileInExplorer
  # 在文件浏览器中定位当前文件

- key: alt+f
  command: workbench.action.findInFiles
  # 全局搜索

- key: shift+cmd+o
  command: workbench.action.quickOpen
  # 快速打开文件（覆盖默认的符号跳转）

- key: shift+cmd+[
  command: workbench.action.previousEditor
  # 切换到上一个编辑器标签页

- key: shift+cmd+]
  command: workbench.action.nextEditor
  # 切换到下一个编辑器标签页

- key: shift+alt+c
  mac: shift+cmd+c
  command: vhashTools.copySelectionPathRange
  when: editorTextFocus
  # 复制文件路径与行号范围（macOS: Shift+Cmd+C / Win&Linux: Shift+Alt+C）

- key: shift+cmd+c
  command: copyFilePath
  when: "!editorFocus"
  # 非编辑区时复制文件路径
